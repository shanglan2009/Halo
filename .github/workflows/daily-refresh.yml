# Halo - GitHub Actions 定时数据更新
# 每个交易日运行数据采集，更新缓存数据
# 北京时间 9:25, 13:05, 14:50 对应 UTC 1:25, 5:05, 6:50

name: Daily Data Refresh

on:
  schedule:
    # 北京时间 9:25 (UTC 1:25) - 开盘集合竞价后
    - cron: '25 1 * * 1-5'
    # 北京时间 13:05 (UTC 5:05) - 午盘开盘后
    - cron: '5 5 * * 1-5'
    # 北京时间 14:50 (UTC 6:50) - 收盘前
    - cron: '50 6 * * 1-5'
  workflow_dispatch:  # 允许手动触发

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run data collection
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          python -c "
          import sys, os, json
          sys.path.insert(0, '.')
          from scripts.data_collector import data_collector
          from scripts.recommendation import QUALITY_STOCK_POOL
          
          print('=== Halo 数据采集开始 ===')
          
          # 采集指数数据
          print('采集上证指数...')
          sh_data = data_collector.get_index_data('sh000001')
          print(f'  上证指数: {sh_data.get(\"latest\", {}).get(\"close\", \"N/A\")}')
          
          print('采集深证成指...')
          sz_data = data_collector.get_index_data('sz399001')
          print(f'  深证成指: {sz_data.get(\"latest\", {}).get(\"close\", \"N/A\")}')
          
          # 采集股票池数据
          results = []
          for i, stock in enumerate(QUALITY_STOCK_POOL[:20]):
              try:
                  print(f'采集 [{i+1}/{min(20, len(QUALITY_STOCK_POOL))}] {stock[\"name\"]} ({stock[\"symbol\"]})...')
                  data = data_collector.collect_stock_data(stock['symbol'], stock['name'])
                  
                  # 添加元数据
                  data['meta']['sector'] = stock.get('sector', '')
                  data['meta']['dividend_yield'] = stock.get('dividend_yield', 0)
                  data['meta']['state_ownership'] = stock.get('state_ownership', 0)
                  
                  from scripts.ias_engine import ias_engine
                  ias_result = ias_engine.compute_ias(stock['symbol'], stock['name'], data)
                  
                  results.append({
                      'symbol': stock['symbol'],
                      'name': stock['name'],
                      'ias_score': round(ias_result.ias_score, 2),
                      'industry_score': round(ias_result.industry_pct, 2),
                      'company_score': round(ias_result.company_pct, 2),
                      'passed': ias_result.passed,
                  })
              except Exception as e:
                  print(f'  错误: {e}')
          
          # 保存结果
          os.makedirs('data', exist_ok=True)
          with open('data/latest_results.json', 'w', encoding='utf-8') as f:
              json.dump({
                  'timestamp': __import__('datetime').datetime.now().isoformat(),
                  'sh_index': sh_data.get('latest', {}).get('close'),
                  'sz_index': sz_data.get('latest', {}).get('close'),
                  'results': results,
              }, f, ensure_ascii=False, indent=2)
          
          print(f'=== 数据采集完成，共处理 {len(results)} 只股票 ===')
          "
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ || true
          git diff --staged --quiet || (git commit -m "📊 Auto: 定时数据更新 [$(date -u +'%Y-%m-%d %H:%M UTC')]" && git push)
