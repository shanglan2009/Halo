# Halo - GitHub Actions 定时数据刷新
# 每个交易日北京时间 9:25 / 13:05 / 14:50 自动运行
# 采集实时数据 → 计算 IAS 评分 → 保存 JSON → 推送回仓库
# Vercel 前端直接读取 data/ 目录中的 JSON 文件

name: Daily Data Refresh

on:
  schedule:
    # 北京时间 9:25 (UTC 1:25)
    - cron: '25 1 * * 1-5'
    # 北京时间 13:05 (UTC 5:05)
    - cron: '5 5 * * 1-5'
    # 北京时间 14:50 (UTC 6:50)
    - cron: '50 6 * * 1-5'
  workflow_dispatch:

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run data refresh
        run: |
          echo "=== Halo 数据刷新开始 ==="
          echo "时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          python scripts/refresh_data.py
          echo "=== 数据刷新完成 ==="
      
      - name: Commit and push data
        run: |
          git config --global user.name 'halo-bot[bot]'
          git config --global user.email 'halo-bot[bot]@users.noreply.github.com'
          
          # 只提交 data/ 目录的变更
          git add data/
          
          if git diff --staged --quiet; then
            echo "没有数据变更，跳过提交"
          else
            git commit -m "📊 Auto: 数据刷新 [$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')]"
            git push
            echo "✅ 数据已推送"
          fi
