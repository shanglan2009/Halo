<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统胜率追踪 - Halo</title>
<link rel="stylesheet" href="css/style.css">
<style>
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.summary-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:16px;text-align:center}
.summary-card .lbl{font-size:.8rem;color:var(--text-muted);margin-bottom:4px}
.summary-card .val{font-size:1.4rem;font-weight:700}
.val.green{color:var(--accent-green)}.val.red{color:var(--accent-red)}.val.yellow{color:var(--accent-yellow)}
.status-tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.75rem;font-weight:600}
.tag-hold{background:rgba(96,165,250,.2);color:var(--accent-blue)}
.tag-target{background:rgba(251,191,36,.2);color:var(--accent-yellow)}
.tag-sold{background:rgba(52,211,153,.2);color:var(--accent-green)}
.buy{color:var(--accent-green)}.sell{color:var(--accent-red)}
</style>
</head>
<body>
<header class="header"><div class="container">
<h1 class="logo"><span class="logo-icon">📊</span> 系统胜率追踪 <span class="logo-subtitle">Sim Trading</span></h1>
<nav class="nav"><a href="index.html" class="nav-link">← 返回仪表盘</a></nav>
</div></header>
<main class="main"><div class="container">
<div class="summary-cards" id="cards">
<div class="summary-card"><div class="lbl">累计交易</div><div class="val" id="c-trades">0</div></div>
<div class="summary-card"><div class="lbl">当前持仓</div><div class="val yellow" id="c-hold">0</div></div>
<div class="summary-card"><div class="lbl">胜率</div><div class="val green" id="c-rate">0%</div></div>
<div class="summary-card"><div class="lbl">累计盈亏</div><div class="val" id="c-pnl">0</div></div>
</div>
<div class="card"><div class="card-header"><h3>📈 当前持仓</h3></div><div class="card-body">
<div class="table-container"><table class="data-table"><thead><tr>
<th>股票</th><th>成本价</th><th>当前价</th><th>持仓天数</th><th>累计收益率</th><th>持仓盈亏</th><th>状态</th><th>操作</th>
</tr></thead><tbody id="pos-tbody"><tr><td colspan="8" class="loading-cell">加载中...</td></tr></tbody></table></div>
</div></div>
<div class="card"><div class="card-header"><h3>📋 交易记录（3个月）</h3></div><div class="card-body">
<div class="table-container"><table class="data-table"><thead><tr>
<th>日期</th><th>股票</th><th>类型</th><th>价格</th><th>手数</th><th>金额</th><th>盈亏</th>
</tr></thead><tbody id="trades-tbody"><tr><td colspan="7" class="loading-cell">加载中...</td></tr></tbody></table></div>
</div></div>
</div></main>
<footer class="footer"><div class="container"><p>Halo 投资分析系统 | 模拟交易追踪 | 3个月记录保留</p></div></footer>
<script>
const LOTS=100, TP=0.10, KEEP_DAYS=90, LS_KEY='halo_sim';

function ls(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'{"pos":[],"trades":[],"sold":{}}')}catch(e){return{pos:[],trades:[],sold:{}}}}
function save(d){localStorage.setItem(LS_KEY,JSON.stringify(d))}

function $(s){return document.querySelector(s)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

function cleanup(d){
  const cut=new Date(Date.now()-KEEP_DAYS*86400000).toISOString().slice(0,10);
  d.trades=d.trades.filter(t=>t.date>=cut);
  for(const[s,dt]of Object.entries(d.sold)){if(dt<cut)delete d.sold[s];}
  return d;
}

async function loadPrices(symbols){
  const map={};
  if(!symbols.length)return map;
  for(let i=0;i<symbols.length;i+=3){
    await Promise.all(symbols.slice(i,i+3).map(async s=>{
      try{
        const pfx=s.startsWith('6')?'1':'0';
        const r=await fetch(`https://push2.eastmoney.com/api/qt/stock/get?secid=${pfx}.${s}&fields=f43,f58`);
        const j=await r.json();
        if(j?.data){map[s]={price:(j.data.f43||0)/100,name:j.data.f58||''};}
      }catch(e){}
    }));
  }
  return map;
}

async function refresh(){
  let d=cleanup(ls());
  
  // 获取持仓股票实时价格
  const syms=d.pos.map(p=>p.symbol);
  const prices=await loadPrices(syms);
  
  // 检查止盈
  const today=new Date().toISOString().slice(0,10);
  for(let i=d.pos.length-1;i>=0;i--){
    const p=d.pos[i];
    const cp=prices[p.symbol]?.price||p.buyPrice;
    const ret=(cp-p.buyPrice)/p.buyPrice;
    if(ret>=TP){
      const pnl=(cp-p.buyPrice)*LOTS*100;
      d.trades.push({date:today,symbol:p.symbol,name:p.name,type:'sell',price:cp,lots:LOTS,amount:cp*LOTS*100,pnl:pnl});
      d.sold[p.symbol]=today;
      d.pos.splice(i,1);
    }
  }
  
  save(d);
  render(d,prices);
}

function render(d,prices){
  // 汇总
  const sells=d.trades.filter(t=>t.type==='sell');
  const wins=sells.filter(t=>t.pnl>0).length;
  const totalPnl=sells.reduce((s,t)=>s+(t.pnl||0),0);
  $('#c-trades').textContent=sells.length;
  $('#c-hold').textContent=d.pos.length;
  $('#c-rate').textContent=sells.length?(wins/sells.length*100).toFixed(1)+'%':'0%';
  const pE=$('#c-pnl');pE.textContent=(totalPnl>=0?'+':'')+totalPnl.toFixed(0);
  pE.className='val '+(totalPnl>0?'green':totalPnl<0?'red':'yellow');
  
  // 持仓
  const tb=$('#pos-tbody');
  if(!d.pos.length){tb.innerHTML='<tr><td colspan="8"><div class="empty-state"><h3>暂无持仓</h3><p>系统推荐股票后自动模拟买入</p></div></td></tr>';}
  else{
    tb.innerHTML=d.pos.map((p,i)=>{
      const cp=prices[p.symbol]?.price||p.buyPrice;
      const ret=(cp-p.buyPrice)/p.buyPrice*100;
      const pnl=(cp-p.buyPrice)*LOTS*100;
      const days=Math.floor((Date.now()-new Date(p.buyDate))/86400000);
      const tag=ret>=7?'tag-target':'tag-hold';
      const txt=ret>=7?'🎯 接近止盈':'📌 持有中';
      return `<tr>
        <td><strong>${esc(p.name)}</strong><br><span class="name-cell">${esc(p.symbol)}</span></td>
        <td>${p.buyPrice.toFixed(2)}</td><td>${cp.toFixed(2)}</td><td>${days}天</td>
        <td class="${ret>=0?'score-high':'score-low'}">${(ret>=0?'+':'')+ret.toFixed(2)}%</td>
        <td class="${pnl>=0?'score-high':'score-low'}">${(pnl>=0?'+':'')+pnl.toFixed(0)}</td>
        <td><span class="status-tag ${tag}">${txt}</span></td>
        <td><button class="btn btn-secondary btn-sm" onclick="manualSell('${p.symbol}')">手动卖出</button></td>
      </tr>`;
    }).join('');
  }
  
  // 交易记录
  const tt=$('#trades-tbody');
  if(!d.trades.length){tt.innerHTML='<tr><td colspan="7"><div class="empty-state"><h3>暂无交易记录</h3></div></td></tr>';}
  else{
    tt.innerHTML=d.trades.slice(-50).reverse().map(t=>`<tr>
      <td>${t.date}</td><td><strong>${esc(t.name)}</strong><br><span class="name-cell">${esc(t.symbol)}</span></td>
      <td class="${t.type==='buy'?'buy':'sell'}">${t.type==='buy'?'买入':'卖出'}</td>
      <td>${t.price.toFixed(2)}</td><td>${t.lots}手</td>
      <td>${t.amount.toFixed(0)}</td>
      <td class="${(t.pnl||0)>=0?'score-high':'score-low'}">${t.pnl?(t.pnl>=0?'+':'')+t.pnl.toFixed(0):'--'}</td>
    </tr>`).join('');
  }
}

// 系统推荐时调用此函数模拟买入
window.simBuy=async function(symbol,name,price){
  if(!price||price<=0)return;
  let d=cleanup(ls());
  if(d.pos.find(p=>p.symbol===symbol))return; // 已持仓
  if(d.sold[symbol]&&d.sold[symbol]>=new Date(Date.now()-90*86400000).toISOString().slice(0,10))return; // 3月内卖过
  const today=new Date().toISOString().slice(0,10);
  d.pos.push({symbol,name,buyPrice:price,buyDate:today,lots:LOTS,cost:price*LOTS*100});
  d.trades.push({date:today,symbol,name,type:'buy',price,lots:LOTS,amount:price*LOTS*100});
  delete d.sold[symbol]; // 再次推荐允许买入
  save(d);
  refresh();
};

// 手动卖出
window.manualSell=async function(symbol){
  let d=cleanup(ls());
  const idx=d.pos.findIndex(p=>p.symbol===symbol);
  if(idx<0)return;
  const p=d.pos[idx];
  const prices=await loadPrices([symbol]);
  const cp=prices[symbol]?.price||p.buyPrice;
  const today=new Date().toISOString().slice(0,10);
  const pnl=(cp-p.buyPrice)*LOTS*100;
  d.trades.push({date:today,symbol,name:p.name,type:'sell',price:cp,lots:LOTS,amount:cp*LOTS*100,pnl});
  d.sold[symbol]=today;
  d.pos.splice(idx,1);
  save(d);
  refresh();
};

refresh();
</script>
</body>
</html>
